name: HIL Firmware Validation

# Dispara o pipeline sempre que um código for empurrado para a branch main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # A tag 'self-hosted' é o que direciona a nuvem para o seu Arch Linux
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Compilar Firmware (CMake + GCC ARM)
      working-directory: ./examples/stm32u5_demo
      run: |
        rm -rf build/
        cmake --preset Debug -DENABLE_HIL_TESTS=ON
        cmake --build --preset Debug -j$(nproc)

    - name: Executar Testes no Hardware (pyOCD)
      run: |
        if [ ! -d "hil_tool/debug_env" ]; then
          python3 -m venv hil_tool/debug_env
        fi
        
        source hil_tool/debug_env/bin/activate
        pip install -r hil_tool/requirements.txt
        pyocd pack install stm32u575zitx
        
        # Dispara a automação passando o caminho do projeto alvo!
        python3 hil_tool/runner.py --app examples/stm32u5_demo