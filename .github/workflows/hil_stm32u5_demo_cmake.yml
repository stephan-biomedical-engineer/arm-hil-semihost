name: HIL Validation - stm32u5_demo_cmake

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Compilar Firmware (CMAKE)
      working-directory: ./examples/stm32u5_demo_cmake
      run: |
        rm -rf build/
        cmake --preset Debug -DENABLE_HIL_TESTS=ON
        cmake --build --preset Debug -j$(nproc)

    - name: Executar Testes no Hardware (pyOCD)
      run: |
        HIL_LIB="."
        if [ ! -d "$HIL_LIB/hil_tool/debug_env" ]; then
          python3 -m venv $HIL_LIB/hil_tool/debug_env
        fi
        source $HIL_LIB/hil_tool/debug_env/bin/activate
        pip install -q -r $HIL_LIB/hil_tool/requirements.txt
        python3 $HIL_LIB/hil_tool/runner.py --app examples/stm32u5_demo_cmake
